name: Java CI with Maven

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
  pull_request:
    branches:
      - main
      - develop
      - 'feature/*'

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17', '22' ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Build with Maven
        run: mvn -B clean install

      - name: Run tests
        run: mvn test

      - name: Run SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.java }}
          path: target/surefire-reports/

      - name: Upload code coverage
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: code-coverage-${{ matrix.java }}
          path: target/site/jacoco/

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/conference-citation-tool:${{ github.sha }} .

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/conference-citation-tool:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/conference-citation-tool:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/conference-citation-tool:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/conference-citation-tool:latest

      - name: Set up Kubernetes
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG_DATA" | base64 --decode > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/conference-citation-tool-deployment conference-citation-tool=${{ secrets.DOCKERHUB_USERNAME }}/conference-citation-tool:${{ github.sha }}
